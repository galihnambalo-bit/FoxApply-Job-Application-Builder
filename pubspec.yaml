name: foxapply
description: FoxApply - Smart Job Application Builder
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # PDF Generation
  pdf: ^3.10.8
  path_provider: ^2.1.2

  # Image & Camera
  image_picker: ^1.0.7
  image: ^4.1.7
  image_cropper: ^5.0.1

  # Storage & Files
  shared_preferences: ^2.2.3
  file_picker: ^8.0.3
  permission_handler: ^11.3.1
  share_plus: ^9.0.0
  open_filex: ^4.3.4

  # UI
    google_fonts: ^6.2.0
          
  # Localization
  intl: ^0.19.0

  # Ads
  google_mobile_ads: ^5.1.0
  
  # Utils
  uuid: ^4.4.0
  get: ^4.6.6
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon_1024.png"
  adaptive_icon_background: "#FF6B2B"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/templates/
