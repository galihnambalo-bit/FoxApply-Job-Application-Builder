name: Build FoxApply APK & AAB

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Download Poppins Fonts (Google Fonts)
        run: |
          mkdir -p assets/fonts
          BASE="https://github.com/google/fonts/raw/main/ofl/poppins"
          curl -fsSL "$BASE/Poppins-Regular.ttf"  -o assets/fonts/Poppins-Regular.ttf
          curl -fsSL "$BASE/Poppins-Medium.ttf"   -o assets/fonts/Poppins-Medium.ttf
          curl -fsSL "$BASE/Poppins-SemiBold.ttf" -o assets/fonts/Poppins-SemiBold.ttf
          curl -fsSL "$BASE/Poppins-Bold.ttf"     -o assets/fonts/Poppins-Bold.ttf
          echo "✅ Fonts downloaded:"
          ls -lh assets/fonts/

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Generate Localizations
        run: flutter gen-l10n

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos || true
        continue-on-error: true

      - name: Run Tests
        run: flutter test || true
        continue-on-error: true

      - name: Build APK (Debug)
        run: flutter build apk --debug --no-shrink

      - name: Build APK (Release)
        run: flutter build apk --release --no-shrink --android-skip-build-dependency-validation

      - name: Build AAB (Release)
        run: flutter build appbundle --release --android-skip-build-dependency-validation

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FoxApply-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FoxApply-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: FoxApply-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: FoxApply-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            app-release.aab
          generate_release_notes: true
          name: FoxApply ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
