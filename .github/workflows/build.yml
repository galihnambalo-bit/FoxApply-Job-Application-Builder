name: Build FoxApply APK & AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Download Poppins Fonts
        continue-on-error: true
        run: |
          mkdir -p assets/fonts
          # Coba download dari beberapa sumber
          curl -fsSL "https://fonts.gstatic.com/s/poppins/v21/pxiEyp8kv8JHgFVrJJfecg.woff2" -o /tmp/test.woff2 || true
          # Pakai wget sebagai alternatif
          wget -q "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Regular.ttf" -O assets/fonts/Poppins-Regular.ttf || \
          curl -fsSL --retry 3 "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Regular.ttf" -o assets/fonts/Poppins-Regular.ttf || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Medium.ttf" -O assets/fonts/Poppins-Medium.ttf || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-SemiBold.ttf" -O assets/fonts/Poppins-SemiBold.ttf || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Bold.ttf" -O assets/fonts/Poppins-Bold.ttf || true
          ls -lh assets/fonts/ || echo "Font download failed, using google_fonts package instead"

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Generate Localizations
        run: flutter gen-l10n

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos || true

      - name: Run Tests
        run: flutter test || true

      - name: Build APK (Debug)
        run: flutter build apk --debug --no-shrink --android-skip-build-dependency-validation

      - name: Build APK (Release)
        run: flutter build apk --release --no-shrink --android-skip-build-dependency-validation
        continue-on-error: true

      - name: Build AAB (Release)
        run: flutter build appbundle --release --android-skip-build-dependency-validation
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FoxApply-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FoxApply-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FoxApply-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
